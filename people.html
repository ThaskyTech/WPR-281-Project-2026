<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage People - Arch Ledger</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Arch Ledger</h1>
        <nav>
            <ul class="nav-list">
                <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
                <li><a href="ticket.html" class="nav-link active-link">Create Ticket</a></li>
                <li><a href="people.html" class="nav-link">Manage People</a></li>
                <li><a href="projects.html" class="nav-link">Manage Projects</a></li>
            </ul>
        </nav>
        <div class="admin-profile">
            <a href="sign_in.html" class="nav-link">Sign-In</a>
        </div>
    </header>

    <main>
        <section class="form-container">
            <h2>Add New Person</h2>
            
            <form id="form-person">
                
                <fieldset>
                    <legend>System Credentials</legend>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="person-id">System ID:</label>
                            <input type="text" id="person-id" placeholder="e.g., EMP-001" required>
                        </div>
                        <div class="form-group">
                            <label for="person-username">Unique Username:</label>
                            <input type="text" id="person-username" placeholder="e.g., jsmith99" required>
                        </div>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Personal Information</legend>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="person-name">First Name:</label>
                            <input type="text" id="person-name" placeholder="John" required>
                        </div>
                        <div class="form-group">
                            <label for="person-surname">Surname:</label>
                            <input type="text" id="person-surname" placeholder="Smith" required>
                        </div>
                    </div>

                    <label for="person-email">Email Address:</label>
                    <input type="email" id="person-email" placeholder="john.smith@company.com" required>

                    <label for="person-pic">Profile Picture URL (Optional):</label>
                    <input type="url" id="person-pic" placeholder="https://example.com/my-photo.jpg">
                </fieldset>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Save Person</button>
                    <button type="reset" class="btn-secondary">Clear Form</button>
                </div>
            </form>
        </section>
    </main>
    <script src="people.js"></script>
    <script src="auth.js"></script>
    <script src="storage.js"></script>
    <script src="ticket.js"></script>
</body>
</html>
