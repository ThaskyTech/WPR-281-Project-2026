<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arch Ledger - Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Arch Ledger</h1>
        <nav>
            <ul class="nav-list">
                <li><a href="dashboard.html" class="nav-link active-link">Dashboard</a></li>
                <li><a href="ticket.html" class="nav-link">Create Ticket</a></li>
                <li><a href="people.html" class="nav-link">Manage People</a></li>
                <li><a href="projects.html" class="nav-link">Manage Projects</a></li>
            </ul>
        </nav>
        <div class="admin-profile">
            <a href="sign_in.html" class="nav-link">Sign-In</a>
        </div>
    </header>

    <main>
        <section id="view-dashboard" class="form-container" style="max-width: 100%; box-shadow: none; background: transparent;">
            <h2>Issues Dashboard</h2>
            <div class="kanban-board" id="bugsList">
                
                <section class="kanban-column" id="col-open">
                    <h3>Open</h3>
                    <article class="ticket-card priority-high">
                        <header>
                            <h4>Login button fails</h4>
                            <span class="badge">High</span>
                        </header>
                        <p>Project: E-Commerce Web</p>
                        <footer>
                            <small>Assigned to: jdoe</small>
                            <button class="btn-view-details" data-id="1">View Details</button>
                        </footer>
                    </article>
                </section>

                <section class="kanban-column" id="col-overdue">
                    <h3>Overdue</h3>
                </section>

                <section class="kanban-column" id="col-resolved">
                    <h3>Resolved</h3>
                </section>
                
            </div>
        </section>
    </main>

    <dialog id="modal-issue-details">
        <article>
            <header>
                <h2 id="modal-title">Issue Summary</h2>
                <button id="btn-close-modal" class="btn-secondary">Close</button>
            </header>
            <div id="modal-content">
                </div>
            <footer style="margin-top: 1rem;">
                <a href="ticket.html" id="btn-edit-issue" class="btn-primary" style="text-decoration: none; display: inline-block;">Edit this Issue</a>
            </footer>
        </article>
    </dialog>

</body>
</html>
